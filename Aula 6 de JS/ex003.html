<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa</title>
    <style>
        body{background-color: rgb(131, 131, 207);
        color: rgb(244, 243, 245);
        font: normal 20pt arial;
        }
        h1{
            color: brown;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição</p>
    <script>
        var n1 = Number(window.prompt('Digite um número: '))// String
        var n2 = Number(window.prompt('Digite outro numero: '))// String
        var s = n1 + n2
        window.alert('A soma dos valores é ' + s)
        // (number + number) para adição
        // (string + string) para concatenação
        //widow.prompt recebe valor como string
    </script>
</body>
</html>
